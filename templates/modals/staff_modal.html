<!-- Staff Modal -->
<div id="staffModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-user-tie"></i> <span id="staffModalTitle">إضافة موظف</span></h2>
            <span class="close" onclick="closeModal('staffModal')">&times;</span>
        </div>
        <form id="staffForm">
            <input type="hidden" id="staffId" name="staffId">

            <div class="form-group">
                <label>اسم الموظف</label>
                <input type="text" name="name" id="staffName" required>
            </div>

            <div class="form-group">
                <label>المسمى الوظيفي</label>
                <select name="role" id="staffRole" required>
                    <option value="">اختر المسمى...</option>
                    {% for role in staff_roles %}
                    <option value="{{ role.id }}">{{ role.role_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>الهاتف</label>
                <input type="text" name="phone" id="staffPhone">
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" name="email" id="staffEmail">
            </div>

            <div class="form-group">
                <label>تاريخ التعيين</label>
                <input type="date" name="hire_date" id="staffHireDate">
            </div>

            <div class="form-group">
                <label>حالة الموظف</label>
                <select name="is_active" id="staffIsActive">
                    <option value="true">نشط</option>
                    <option value="false">موقوف</option>
                </select>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="staffCreateAccount" name="create_account">
                    إنشاء/تحديث حساب دخول للموظف
                </label>
            </div>

            <div class="account-fields-grid" id="staffAccountFields">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" name="username" id="staffUsername">
                </div>
                <div class="form-group">
                    <label>كلمة المرور (اختياري في التعديل)</label>
                    <input type="password" name="password" id="staffPassword">
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('staffModal')">إلغاء</button>
                <button type="submit" class="btn btn-primary">حفظ</button>
            </div>
        </form>
    </div>
</div>
