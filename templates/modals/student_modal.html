<!-- Student Modal -->
<div id="studentModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-user-graduate"></i> <span id="studentModalTitle">إضافة طالب</span></h2>
            <span class="close" onclick="closeModal('studentModal')">&times;</span>
        </div>
        <form id="studentForm">
            <input type="hidden" id="studentId" name="studentId">
            
            <div class="form-group">
                <label>الاسم</label>
                <input type="text" name="name" id="studentName" required>
            </div>
            
            <div class="form-group">
                <label>تاريخ الميلاد</label>
                <input type="date" name="birth_date" id="studentBirthDate" required>
            </div>
            
            <div class="form-group">
                <label>الجنس</label>
                <select name="gender" id="studentGender" required>
                    <option value="">اختر...</option>
                    <option value="M">ذكر</option>
                    <option value="F">أنثى</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" name="phone" id="studentPhone" required>
            </div>
            
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" name="email" id="studentEmail" required>
            </div>
            
            <div class="form-group">
                <label>العنوان</label>
                <input type="text" name="address" id="studentAddress">
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('studentModal')">إلغاء</button>
                <button type="submit" class="btn btn-primary">حفظ</button>
            </div>
        </form>
    </div>
</div>
