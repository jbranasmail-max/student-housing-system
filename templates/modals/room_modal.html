<!-- Room Modal -->
<div id="roomModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-door-open"></i> <span id="roomModalTitle">إضافة غرفة</span></h2>
            <span class="close" onclick="closeModal('roomModal')">&times;</span>
        </div>
        <form id="roomForm">
            <input type="hidden" id="roomId" name="roomId">
            
            <div class="form-group">
                <label>المبنى</label>
                <select name="building" id="roomBuilding" required>
                    <option value="">اختر المبنى...</option>
                    {% for building in buildings %}
                    <option value="{{ building.id }}">{{ building.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>رقم الغرفة</label>
                <input type="text" name="room_number" id="roomNumber" required>
            </div>
            
            <div class="form-group">
                <label>رقم الشقة (اختياري)</label>
                <input type="text" name="apartment_number" id="apartmentNumber">
            </div>
            
            <div class="form-group">
                <label>الطابق</label>
                <input type="number" name="floor_number" id="floorNumber" required>
            </div>
            
            <div class="form-group">
                <label>السعة (عدد الأسرة)</label>
                <input type="number" name="capacity" id="roomCapacity" required min="1">
            </div>
            
            <div class="form-group">
                <label>السعر</label>
                <input type="number" name="price" id="roomPrice" required min="0" step="0.01">
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('roomModal')">إلغاء</button>
                <button type="submit" class="btn btn-primary">حفظ</button>
            </div>
        </form>
    </div>
</div>
