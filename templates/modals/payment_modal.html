<!-- Payment Modal -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-money-bill-wave"></i> <span id="paymentModalTitle">إضافة دفعة</span></h2>
            <span class="close" onclick="closeModal('paymentModal')">&times;</span>
        </div>
        <form id="paymentForm">
            <input type="hidden" id="paymentId" name="paymentId">
            
            <div class="form-group">
                <label>الطالب</label>
                <select name="student" id="paymentStudent" required>
                    <option value="">اختر الطالب...</option>
                    {% for student in students %}
                    <option value="{{ student.id }}">{{ student.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>المبلغ</label>
                <input type="number" name="amount" id="paymentAmount" required min="0" step="0.01">
            </div>
            
            <div class="form-group">
                <label>تاريخ الدفع</label>
                <input type="date" name="payment_date" id="paymentDate" required>
            </div>
            
            <div class="form-group">
                <label>طريقة الدفع</label>
                <select name="method" id="paymentMethod" required>
                    <option value="">اختر الطريقة...</option>
                    {% for method in payment_methods %}
                    <option value="{{ method.id }}">{{ method.method_name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('paymentModal')">إلغاء</button>
                <button type="submit" class="btn btn-primary">حفظ</button>
            </div>
        </form>
    </div>
</div>
